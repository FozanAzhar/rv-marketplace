# Local development stack (see Dockerfile.dev).
services:  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    # Auto-migrate on boot, then start the API on port 3000.
    command: bash -c "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - /rails/bin
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/rv_marketplace_development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle:
