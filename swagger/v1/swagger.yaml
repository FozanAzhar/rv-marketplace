---
openapi: 3.0.1
info:
  title: RV Marketplace API
  version: v1
  description: REST API for listing RVs, requesting bookings, and managing reservations.
paths:
  "/auth/signup":
    post:
      summary: Sign up
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: user created
        '422':
          description: validation error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  example: jane@example.com
                password:
                  type: string
                  example: password123
                password_confirmation:
                  type: string
                  example: password123
              required:
              - name
              - email
              - password
              - password_confirmation
  "/auth/login":
    post:
      summary: Log in
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: authenticated
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
              - email
              - password
  "/listings/{listing_id}/bookings":
    parameters:
    - name: listing_id
      in: path
      description: Listing ID
      required: true
      schema:
        type: integer
    post:
      summary: Request a booking
      tags:
      - Bookings
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        description: Bearer token
        schema:
          type: string
      responses:
        '201':
          description: booking created
        '403':
          description: owner cannot book own listing
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                booking:
                  type: object
                  properties:
                    start_date:
                      type: string
                      format: date
                    end_date:
                      type: string
                      format: date
                  required:
                  - start_date
                  - end_date
              required:
              - booking
  "/bookings":
    get:
      summary: List bookings for current user
      tags:
      - Bookings
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: bookings found
        '401':
          description: unauthorized
  "/bookings/{id}/confirm":
    parameters:
    - name: id
      in: path
      description: Booking ID
      required: true
      schema:
        type: integer
    patch:
      summary: Confirm a booking
      tags:
      - Bookings
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: booking confirmed
        '403':
          description: forbidden
        '422':
          description: booking not pending
  "/bookings/{id}/reject":
    parameters:
    - name: id
      in: path
      description: Booking ID
      required: true
      schema:
        type: integer
    patch:
      summary: Reject a booking
      tags:
      - Bookings
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: booking rejected
        '403':
          description: forbidden
  "/listings":
    get:
      summary: List all listings
      tags:
      - Listings
      responses:
        '200':
          description: listings found
    post:
      summary: Create a listing
      tags:
      - Listings
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        description: Bearer token
        schema:
          type: string
      responses:
        '201':
          description: listing created
        '401':
          description: unauthorized
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rv_listing:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    location:
                      type: string
                    price_per_day:
                      type: number
                  required:
                  - title
                  - description
                  - location
                  - price_per_day
              required:
              - rv_listing
  "/listings/{id}":
    parameters:
    - name: id
      in: path
      description: Listing ID
      required: true
      schema:
        type: integer
    get:
      summary: Show a listing
      tags:
      - Listings
      responses:
        '200':
          description: listing found
        '404':
          description: not found
    patch:
      summary: Update a listing
      tags:
      - Listings
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: listing updated
        '403':
          description: forbidden
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rv_listing:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    location:
                      type: string
                    price_per_day:
                      type: number
              required:
              - rv_listing
    delete:
      summary: Delete a listing
      tags:
      - Listings
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        description: Bearer token
        schema:
          type: string
      responses:
        '204':
          description: listing deleted
        '403':
          description: forbidden
servers:
- url: http://localhost:3000
  description: Development
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from POST /auth/signup or POST /auth/login
  schemas:
    user:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        token:
          type: string
    rv_listing:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        price_per_day:
          type: string
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          "$ref": "#/components/schemas/user"
    booking:
      type: object
      properties:
        id:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum:
          - pending
          - confirmed
          - rejected
        user_id:
          type: integer
        rv_listing_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    error:
      type: object
      properties:
        error:
          type: string
    validation_errors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
