<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RV Marketplace — Find Your Next Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
          },
          colors: {
            brand: {
              50: "#e8f2fc",
              100: "#d1e7fa",
              200: "#a3cff5",
              500: "#1a7fd4",
              600: "#096abf",
              700: "#085aa3",
              800: "#064a87",
              900: "#053a6b",
            },
          },
        },
      },
    };
  </script>
</head>
<body class="flex min-h-screen flex-col bg-stone-50 font-sans text-stone-800 antialiased">

  <svg xmlns="http://www.w3.org/2000/svg" class="hidden" aria-hidden="true">
    <symbol id="icon-rv" viewBox="0 0 24 24">
      <path fill="currentColor" d="M3 12.25c0-.69.56-1.25 1.25-1.25h11.5c.69 0 1.25.56 1.25 1.25V14H3v-1.75z"/>
      <path fill="currentColor" d="M17 10.75              h3.25c.97 0 1.75.78 1.75 1.75V14H17v-3.5z"/>
      <path fill="currentColor" d="M7.25 8.25h5.5c.41 0 .75.34.75.75v2.5H6.5V9c0-.41.34-.75.75-.75z"/>
      <circle fill="currentColor" cx="7.25" cy="16.25" r="1.85"/>
      <circle fill="currentColor" cx="15.75" cy="16.25" r="1.85"/>
    </symbol>
  </svg>

  <!-- Navigation -->
  <nav class="sticky top-0 z-50 border-b border-stone-200/80 bg-white/90 backdrop-blur-md">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="/" class="group flex items-center gap-3">
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-brand-600 text-white shadow-sm ring-1 ring-brand-700/20 transition group-hover:bg-brand-700">
          <svg class="h-6 w-6" aria-hidden="true"><use href="#icon-rv"/></svg>
        </span>
        <span class="text-lg font-bold tracking-tight text-stone-900">
          RV <span class="font-semibold text-brand-600">Marketplace</span>
        </span>
      </a>
      <div class="hidden items-center gap-6 text-sm font-medium text-stone-600 sm:flex">
        <a href="#listings" class="transition hover:text-brand-700">Browse RVs</a>
        <a href="/api-docs" class="transition hover:text-brand-700">API Docs</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="relative overflow-hidden bg-gradient-to-br from-brand-800 via-brand-700 to-brand-900 text-white">
    <div class="absolute inset-0 opacity-10">
      <svg class="h-full w-full" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
            <path d="M0 32V0h32" fill="none" stroke="currentColor" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>
      </svg>
    </div>
    <div class="relative mx-auto max-w-7xl px-4 py-16 sm:px-6 sm:py-20 lg:px-8 lg:py-24">
      <div class="max-w-2xl">
        <p class="mb-3 text-sm font-medium uppercase tracking-widest text-brand-200">Rent &amp; explore</p>
        <h1 class="text-4xl font-bold tracking-tight sm:text-5xl lg:text-6xl">
          Hit the road in the perfect RV
        </h1>
        <p class="mt-5 text-lg leading-relaxed text-brand-100/90">
          Browse camper vans, motorhomes, and travel trailers from owners across the country. Your next adventure starts here.
        </p>
      </div>
    </div>
  </header>

  <!-- Search & filters -->
  <section class="relative z-10 -mt-8 mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="rounded-2xl border border-stone-200 bg-white p-4 shadow-lg shadow-stone-200/50 sm:p-5">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center">
        <div class="relative flex-1">
          <svg class="pointer-events-none absolute left-3.5 top-1/2 h-5 w-5 -translate-y-1/2 text-stone-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
          <input
            id="search"
            type="search"
            placeholder="Search by location or title…"
            class="w-full rounded-xl border border-stone-200 bg-stone-50 py-3 pl-11 pr-4 text-sm text-stone-800 placeholder:text-stone-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20"
          >
        </div>
        <p id="result-count" class="shrink-0 text-sm text-stone-500"></p>
      </div>
    </div>
  </section>

  <!-- Listings -->
  <main id="listings" class="mx-auto flex-1 w-full max-w-7xl px-4 py-12 sm:px-6 lg:px-8">

    <!-- Loading skeletons -->
    <div id="loading" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      <div class="animate-pulse overflow-hidden rounded-2xl border border-stone-200 bg-white">
        <div class="h-48 bg-stone-200"></div>
        <div class="space-y-3 p-5">
          <div class="h-5 w-3/4 rounded bg-stone-200"></div>
          <div class="h-4 w-1/2 rounded bg-stone-200"></div>
          <div class="h-4 w-full rounded bg-stone-200"></div>
          <div class="h-4 w-5/6 rounded bg-stone-200"></div>
        </div>
      </div>
      <div class="animate-pulse overflow-hidden rounded-2xl border border-stone-200 bg-white hidden sm:block">
        <div class="h-48 bg-stone-200"></div>
        <div class="space-y-3 p-5">
          <div class="h-5 w-3/4 rounded bg-stone-200"></div>
          <div class="h-4 w-1/2 rounded bg-stone-200"></div>
          <div class="h-4 w-full rounded bg-stone-200"></div>
          <div class="h-4 w-5/6 rounded bg-stone-200"></div>
        </div>
      </div>
      <div class="animate-pulse overflow-hidden rounded-2xl border border-stone-200 bg-white hidden lg:block">
        <div class="h-48 bg-stone-200"></div>
        <div class="space-y-3 p-5">
          <div class="h-5 w-3/4 rounded bg-stone-200"></div>
          <div class="h-4 w-1/2 rounded bg-stone-200"></div>
          <div class="h-4 w-full rounded bg-stone-200"></div>
          <div class="h-4 w-5/6 rounded bg-stone-200"></div>
        </div>
      </div>
    </div>

    <!-- Status messages -->
    <div id="status" class="hidden"></div>

    <!-- Listing grid -->
    <div id="listing-grid" class="hidden grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-stone-200 bg-white">
    <div class="mx-auto flex max-w-7xl flex-col items-center justify-between gap-4 px-4 py-8 sm:flex-row sm:px-6 lg:px-8">
      <p class="text-sm text-stone-500">&copy; 2026 RV Marketplace. Built with Rails &amp; Tailwind CSS.</p>
      <a href="/api-docs" class="text-sm font-medium text-brand-600 transition hover:text-brand-700">View API documentation</a>
    </div>
  </footer>

  <script>
    // Bonus frontend: fetches GET /listings and renders cards with client-side search.
    (function () {
      // Use same origin when served by Rails (:3000); fall back for Live Server etc.
      var DEFAULT_API = "http://localhost:3000";
      var apiBase = window.location.port === "3000"
        ? window.location.origin
        : DEFAULT_API;

      var CARD_GRADIENTS = [
        "from-amber-400 via-orange-400 to-rose-400",
        "from-sky-400 via-blue-500 to-indigo-500",
        "from-emerald-400 via-teal-500 to-cyan-600",
        "from-violet-400 via-purple-500 to-fuchsia-500",
        "from-lime-400 via-green-500 to-emerald-600",
        "from-rose-400 via-pink-500 to-red-500",
      ];

      var loadingEl = document.getElementById("loading");
      var statusEl = document.getElementById("status");
      var gridEl = document.getElementById("listing-grid");
      var searchEl = document.getElementById("search");
      var resultCountEl = document.getElementById("result-count");

      var allListings = [];

      function formatPrice(value) {
        return new Intl.NumberFormat("en-AU", {
          style: "currency",
          currency: "AUD",
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
        }).format(Number(value));
      }

      function truncate(text, max) {
        if (text.length <= max) return text;
        return text.slice(0, max).trim() + "…";
      }

      function escapeHtml(text) {
        var div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function gradientForId(id) {
        return CARD_GRADIENTS[id % CARD_GRADIENTS.length];
      }

      function cardHtml(listing) {
        var gradient = gradientForId(listing.id);
        return (
          '<article class="group flex flex-col overflow-hidden rounded-2xl border border-stone-200 bg-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md hover:shadow-stone-200/80">' +
            '<div class="relative h-48 bg-gradient-to-br ' + gradient + '">' +
              '<div class="absolute inset-0 bg-black/10"></div>' +
              '<div class="absolute bottom-4 left-4">' +
                '<span class="inline-flex items-center gap-1.5 rounded-full bg-white/95 px-3 py-1 text-xs font-medium text-stone-700 shadow-sm backdrop-blur">' +
                  '<svg class="h-3.5 w-3.5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>' +
                  escapeHtml(listing.location) +
                '</span>' +
              '</div>' +
              '<div class="absolute right-4 top-4 flex h-10 w-10 items-center justify-center rounded-full bg-white/20 text-white backdrop-blur">' +
                '<svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177V8.25m0 0V5.625c0-.621-.504-1.125-1.125-1.125H9.375c-.621 0-1.125.504-1.125 1.125v2.625m6.75 0H9.375"/></svg>' +
              '</div>' +
            '</div>' +
            '<div class="flex flex-1 flex-col p-5">' +
              '<h2 class="text-lg font-semibold text-stone-900 group-hover:text-brand-700 transition">' + escapeHtml(listing.title) + '</h2>' +
              '<p class="mt-2 flex-1 text-sm leading-relaxed text-stone-600">' + escapeHtml(truncate(listing.description, 120)) + '</p>' +
              '<div class="mt-5 flex items-end justify-between border-t border-stone-100 pt-4">' +
                '<div>' +
                  '<p class="text-xs font-medium uppercase tracking-wide text-stone-400">From</p>' +
                  '<p class="text-xl font-bold text-stone-900">' + formatPrice(listing.price_per_day) + '<span class="text-sm font-normal text-stone-500"> / night</span></p>' +
                '</div>' +
                '<span class="rounded-lg bg-brand-50 px-3 py-1.5 text-xs font-semibold text-brand-700">Available</span>' +
              '</div>' +
            '</div>' +
          '</article>'
        );
      }

      function showStatus(type, title, message, showRetry) {
        loadingEl.classList.add("hidden");
        gridEl.classList.add("hidden");
        statusEl.classList.remove("hidden");

        var iconPath = type === "error"
          ? "M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"
          : "M20.25 7.5l-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z";

        var iconColor = type === "error" ? "text-red-500" : "text-stone-400";

        statusEl.innerHTML =
          '<div class="flex flex-col items-center justify-center rounded-2xl border border-dashed border-stone-200 bg-white px-6 py-16 text-center">' +
            '<svg class="mx-auto h-12 w-12 ' + iconColor + '" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="' + iconPath + '"/></svg>' +
            '<h3 class="mt-4 text-lg font-semibold text-stone-900">' + escapeHtml(title) + '</h3>' +
            '<p class="mt-2 max-w-md text-sm text-stone-500">' + escapeHtml(message) + '</p>' +
            (showRetry
              ? '<button id="retry-btn" class="mt-6 rounded-xl bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">Try again</button>'
              : "") +
          '</div>';

        if (showRetry) {
          document.getElementById("retry-btn").addEventListener("click", loadListings);
        }

        resultCountEl.textContent = "";
      }

      function renderListings(listings) {
        loadingEl.classList.add("hidden");
        statusEl.classList.add("hidden");

        if (listings.length === 0) {
          showStatus(
            "empty",
            "No RVs found",
            searchEl.value.trim()
              ? "Try a different search term or clear the filter to see all listings."
              : "There are no listings available yet. Check back soon!",
            false
          );
          return;
        }

        gridEl.classList.remove("hidden");
        gridEl.innerHTML = listings.map(cardHtml).join("");

        var total = allListings.length;
        var showing = listings.length;
        resultCountEl.textContent = showing === total
          ? showing + (showing === 1 ? " RV available" : " RVs available")
          : "Showing " + showing + " of " + total + " RVs";
      }

      function filterListings() {
        var query = searchEl.value.trim().toLowerCase();
        if (!query) {
          renderListings(allListings);
          return;
        }

        var filtered = allListings.filter(function (listing) {
          return (
            listing.title.toLowerCase().includes(query) ||
            listing.location.toLowerCase().includes(query) ||
            listing.description.toLowerCase().includes(query)
          );
        });

        renderListings(filtered);
      }

      function loadListings() {
        loadingEl.classList.remove("hidden");
        gridEl.classList.add("hidden");
        statusEl.classList.add("hidden");

        fetch(apiBase + "/listings")
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Request failed with status " + response.status);
            }
            return response.json();
          })
          .then(function (listings) {
            allListings = listings;
            filterListings();
          })
          .catch(function (error) {
            showStatus(
              "error",
              "Could not load listings",
              "Make sure the API is running at " + apiBase + ".",
              true
            );
            console.error(error);
          });
      }

      searchEl.addEventListener("input", filterListings);
      loadListings();
    })();
  </script>
</body>
</html>
